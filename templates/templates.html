<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEU Library Visitor Log</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background: #f4f7f6; }
.neu-header { background: #006400; color: white; padding: 20px; border-radius: 0 0 20px 20px; }
.card { border-radius: 15px; }
</style>
</head>
<body>
<div class="container mt-5 text-center">
<div class="neu-header mb-4 shadow">
<h1>NEU Library Visitor Log</h1>
</div>

    <div class="card shadow p-4 mx-auto" style="max-width: 500px;">
        <div id="login-section">
            <h4 class="mb-3">Welcome, {{ user_name }}!</h4>
            <p class="text-muted">Please select your reason for visiting today.</p>

            <select id="reason" class="form-select mb-3">
                <option value="Reading">Reading</option>
                <option value="Research">Researching</option>
                <option value="Computer Use">Computer Use</option>
            </select>
            <button class="btn btn-success w-100 p-2" onclick="submitLog()">Log Entry</button>

            {% if role == 'admin' %}
            <hr>
            <a href="/admin" class="btn btn-outline-primary w-100">Go to Admin Dashboard</a>
            <a href="/switch_role/user" class="btn btn-link btn-sm mt-2">Test as Regular User</a>
            {% endif %}

            <a href="/logout" class="btn btn-link text-danger mt-3">Logout</a>
        </div>

        <div id="welcome-msg" class="d-none mt-3">
            <h2 class="text-success">Welcome to NEU Library!</h2>
            <p id="visitor-info" class="fs-4"></p>
            <div class="spinner-border text-success" role="status"></div>
            <p class="small text-muted mt-2">Refreshing in 4 seconds...</p>
        </div>
    </div>
</div>

<script>
    async function submitLog() {
        const formData = new FormData();
        formData.append('reason', document.getElementById('reason').value);

        const response = await fetch('/log_visit', { method: 'POST', body: formData });
        const data = await response.json();

        if(data.status === 'success') {
            document.getElementById('login-section').classList.add('d-none');
            document.getElementById('welcome-msg').classList.remove('d-none');
            document.getElementById('visitor-info').innerText = `${data.name}`;
            setTimeout(() => location.reload(), 4000);
        } else {
            alert(data.message);
        }
    }
</script>


</body>
</html>
